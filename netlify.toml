[build]
  command = "npm run build:netlify"
  publish = "netlify/public"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/scores"
  to = "/.netlify/functions/scores"
  status = 200

[[redirects]]
  from = "/*"
  to = "https://clarklab.github.io/raider-bay/:splat"
  status = 302
