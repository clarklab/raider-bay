name: Build iOS TestFlight

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "Marketing version, for example 1.0.1"
        required: false
        default: "1.0.0"
      build_number:
        description: "App Store build number. Defaults to the GitHub run number."
        required: false
        default: ""
      upload_to_testflight:
        description: "Upload the signed IPA to TestFlight"
        required: true
        default: true
        type: boolean

env:
  GODOT_VERSION: 4.6.2
  GODOT_RELEASE: stable
  GODOT_PRESET: iOS TestFlight
  BUNDLE_IDENTIFIER: com.clarklab.raiderbay

jobs:
  build-ios:
    name: Build and Upload iOS
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          if [ -d /Applications/Xcode_26.5.0.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.5.0.app/Contents/Developer
          elif [ -d /Applications/Xcode_26.4.1.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.4.1.app/Contents/Developer
          else
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          fi
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Validate signing secrets
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          missing=0
          for name in \
            APPLE_TEAM_ID \
            BUILD_CERTIFICATE_BASE64 \
            P12_PASSWORD \
            BUILD_PROVISION_PROFILE_BASE64 \
            APP_STORE_CONNECT_API_KEY_ID \
            APP_STORE_CONNECT_API_ISSUER_ID \
            APP_STORE_CONNECT_API_KEY_BASE64
          do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not set"
              missing=1
            fi
          done
          exit "$missing"

      - name: Download Godot
        run: |
          GODOT_ZIP="$RUNNER_TEMP/godot.zip"
          curl -L \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_macos.universal.zip" \
            -o "$GODOT_ZIP"
          unzip -q "$GODOT_ZIP" -d "$RUNNER_TEMP/godot"
          GODOT_BIN="$(find "$RUNNER_TEMP/godot" -path "*/Godot.app/Contents/MacOS/Godot" -type f | head -1)"
          if [ -z "$GODOT_BIN" ]; then
            echo "::error::Godot binary not found after unzip"
            exit 1
          fi
          chmod +x "$GODOT_BIN"
          echo "GODOT_BIN=$GODOT_BIN" >> "$GITHUB_ENV"
          "$GODOT_BIN" --version

      - name: Install Godot export templates
        run: |
          TEMPLATE_ZIP="$RUNNER_TEMP/export_templates.tpz"
          TEMPLATE_DIR="$HOME/Library/Application Support/Godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}"
          curl -L \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_export_templates.tpz" \
            -o "$TEMPLATE_ZIP"
          rm -rf "$RUNNER_TEMP/export_templates" "$TEMPLATE_DIR"
          mkdir -p "$RUNNER_TEMP/export_templates" "$TEMPLATE_DIR"
          unzip -q "$TEMPLATE_ZIP" -d "$RUNNER_TEMP/export_templates"
          if [ -d "$RUNNER_TEMP/export_templates/templates" ]; then
            cp -R "$RUNNER_TEMP/export_templates/templates/." "$TEMPLATE_DIR/"
          else
            cp -R "$RUNNER_TEMP/export_templates/." "$TEMPLATE_DIR/"
          fi
          ls -la "$TEMPLATE_DIR" | sed -n '1,80p'

      - name: Install Apple signing assets
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          PROFILE_PATH="$RUNNER_TEMP/build_profile.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          export CERTIFICATE_PATH PROFILE_PATH BUILD_CERTIFICATE_BASE64 BUILD_PROVISION_PROFILE_BASE64
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          Path(os.environ["CERTIFICATE_PATH"]).write_bytes(base64.b64decode(os.environ["BUILD_CERTIFICATE_BASE64"]))
          Path(os.environ["PROFILE_PATH"]).write_bytes(base64.b64decode(os.environ["BUILD_PROVISION_PROFILE_BASE64"]))
          PY

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          PROFILE_UUID="$(security cms -D -i "$PROFILE_PATH" | /usr/libexec/PlistBuddy -c 'Print UUID' /dev/stdin)"
          PROFILE_NAME="$(security cms -D -i "$PROFILE_PATH" | /usr/libexec/PlistBuddy -c 'Print Name' /dev/stdin)"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"
          security find-identity -v -p codesigning

      - name: Patch iOS export preset
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          VERSION_NAME_INPUT: ${{ github.event.inputs.version_name }}
          BUILD_NUMBER_INPUT: ${{ github.event.inputs.build_number }}
        run: |
          VERSION_NAME="${VERSION_NAME_INPUT:-1.0.0}"
          BUILD_NUMBER="${BUILD_NUMBER_INPUT:-$GITHUB_RUN_NUMBER}"
          export VERSION_NAME BUILD_NUMBER
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          path = Path("export_presets.cfg")
          text = path.read_text()
          replacements = {
              r'application/app_store_team_id="[^"]*"': f'application/app_store_team_id="{os.environ["APPLE_TEAM_ID"]}"',
              r'application/provisioning_profile_uuid_release="[^"]*"': f'application/provisioning_profile_uuid_release="{os.environ["PROFILE_UUID"]}"',
              r'application/provisioning_profile_specifier_release="[^"]*"': f'application/provisioning_profile_specifier_release="{os.environ["PROFILE_NAME"]}"',
              r'application/bundle_identifier="[^"]*"': f'application/bundle_identifier="{os.environ["BUNDLE_IDENTIFIER"]}"',
              r'application/short_version="[^"]*"': f'application/short_version="{os.environ["VERSION_NAME"]}"',
              r'application/version="[^"]*"': f'application/version="{os.environ["BUILD_NUMBER"]}"',
          }
          for pattern, value in replacements.items():
              text = re.sub(pattern, value, text, count=1)
          path.write_text(text)
          PY
          rg -n 'application/(app_store_team_id|bundle_identifier|short_version|version|provisioning_profile)' export_presets.cfg

      - name: Import project
        run: |
          "$GODOT_BIN" --headless --path . --import --quit

      - name: Build signed IPA
        run: |
          mkdir -p builds/ios
          "$GODOT_BIN" --headless --path . --export-release "$GODOT_PRESET" "builds/ios/raider-bay.ipa"
          IPA_PATH="$(find builds/ios -name '*.ipa' -type f | head -1)"
          if [ -z "$IPA_PATH" ]; then
            echo "::error::No IPA was produced"
            find builds/ios -maxdepth 4 -print
            exit 1
          fi
          echo "IPA_PATH=$IPA_PATH" >> "$GITHUB_ENV"
          ls -lh "$IPA_PATH"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: raider-bay-ios-ipa
          path: builds/ios/*.ipa

      - name: Upload to TestFlight
        if: ${{ github.event.inputs.upload_to_testflight == 'true' }}
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          API_KEY_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          export API_KEY_PATH APP_STORE_CONNECT_API_KEY_BASE64
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          Path(os.environ["API_KEY_PATH"]).write_bytes(base64.b64decode(os.environ["APP_STORE_CONNECT_API_KEY_BASE64"]))
          PY
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_ISSUER_ID"
