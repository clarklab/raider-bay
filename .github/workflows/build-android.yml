name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  android-debug:
    name: Android Debug APK
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          mkdir -p /root/.local/share/godot/export_templates/4.6.stable
          cp /root/.local/share/godot/export_templates/4.6.stable/* /root/.local/share/godot/export_templates/4.6.stable/ 2>/dev/null || true
          mkdir -p /root/.config/godot

      - name: Setup Android keystore and SDK
        run: |
          mkdir -p /root/.config/godot
          cat > /root/.config/godot/editor_settings-4.tres <<SETTINGS
          [gd_resource type="EditorSettings"]

          [resource]
          export/android/android_sdk_path = "/usr/lib/android-sdk"
          export/android/debug_keystore = "/root/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          SETTINGS

      - name: Import project
        run: godot --headless --import 2>&1 || true

      - name: Build APK
        run: |
          mkdir -p builds
          godot --headless --verbose --export-debug "Android" builds/raider-bay.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: raider-bay-debug
          path: builds/raider-bay.apk
          retention-days: 30
