name: Build Android APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-debug:
    name: Android Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: barichello/godot-ci:4.6
    env:
      HOME: /root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Android keystore and SDK
        run: |
          mkdir -p /root/.config/godot
          printf '%s\n' \
            '[gd_resource type="EditorSettings"]' \
            '' \
            '[resource]' \
            'export/android/android_sdk_path = "/usr/lib/android-sdk"' \
            'export/android/java_sdk_path = "/usr"' \
            'export/android/debug_keystore = "/root/debug.keystore"' \
            'export/android/debug_keystore_user = "androiddebugkey"' \
            'export/android/debug_keystore_pass = "android"' \
            > /root/.config/godot/editor_settings-4.tres

      - name: Import project
        timeout-minutes: 3
        run: timeout 120 godot --headless --import || true

      - name: Set APK version metadata
        run: |
          version_name="${GITHUB_REF_NAME#v}"
          if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
            version_name="dev-${GITHUB_RUN_NUMBER}"
          fi
          export VERSION_NAME="$version_name"
          perl -0pi -e 's/version\/code=\d+/version\/code=$ENV{GITHUB_RUN_NUMBER}/' export_presets.cfg
          perl -0pi -e 's/version\/name="[^"]+"/version\/name="$ENV{VERSION_NAME}"/' export_presets.cfg
          perl -0pi -e 's/config\/version="[^"]*"/config\/version="$ENV{VERSION_NAME}"/' project.godot
          grep -E 'version/(code|name)=|launcher_icons/main_192x192=' export_presets.cfg

      - name: Build APK
        timeout-minutes: 5
        run: |
          mkdir -p builds
          timeout 240 godot --headless --export-debug "Android" builds/raider-bay.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: raider-bay-debug
          path: builds/raider-bay.apk
          retention-days: 30

  release:
    name: Create Release
    needs: android-debug
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: raider-bay-debug

      - name: Copy APK to versioned name
        run: cp raider-bay.apk raider-bay-${{ github.ref_name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Raider Bay ${{ github.ref_name }}
          generate_release_notes: true
          # raider-bay.apk keeps a constant name so
          # releases/latest/download/raider-bay.apk is an evergreen link.
          files: |
            raider-bay-${{ github.ref_name }}.apk
            raider-bay.apk
