name: Deploy Web

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: web-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build Web Export
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: barichello/godot-ci:4.6
    env:
      HOME: /root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Web export
        timeout-minutes: 8
        run: bash scripts/build-web.sh

      - name: Assemble site (landing page at /, game at /play/)
        run: |
          mkdir -p public/play
          cp -r site/. public/
          rm -f public/.gdignore
          cp -r builds/web/. public/play/
          # Unfurl tags for the game page too (Godot regenerates its
          # index.html each export, so inject at assemble time).
          UNFURL='<meta property="og:title" content="Raider Bay"><meta property="og:description" content="Cold water, big fish, bigger money. A pixel-art fishing board game - play free in your browser."><meta property="og:type" content="website"><meta property="og:url" content="https://raiderbay.superfun.games/play/"><meta property="og:image" content="https://raiderbay.superfun.games/assets/unfurl.jpg"><meta name="twitter:card" content="summary_large_image"><meta name="twitter:image" content="https://raiderbay.superfun.games/assets/unfurl.jpg">'
          perl -0pi -e "s|<head>|<head>\n$UNFURL|" public/play/index.html

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: public
          retention-days: 7

  deploy:
    name: Deploy to Netlify
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # The repo checkout supplies netlify.toml (redirect rules) and the
      # functions source — without it the CLI shipped a static site only,
      # so the /api/scores function 404'd and global scores went dark.
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: site
          path: public

      # The scores function imports @netlify/blobs — esbuild needs it present
      # in node_modules to bundle it, or the lambda dies on cold start (502).
      - name: Install function dependencies
        run: npm ci --omit=dev

      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          # Belt and suspenders: the redirect also travels inside the publish dir.
          printf '/api/scores  /.netlify/functions/scores  200\n' > public/_redirects
          npx --yes netlify-cli@17 deploy --prod \
            --dir public \
            --functions netlify/functions \
            --site "$NETLIFY_SITE_ID" \
            --auth "$NETLIFY_AUTH_TOKEN" \
            --message "deploy ${GITHUB_SHA::7}"
